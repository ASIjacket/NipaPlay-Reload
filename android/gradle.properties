org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental compilation to work around cross-drive (C:/D:) bug
# where RelocatableFileToPathConverter cannot compute relative paths across different roots
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.multiplatform=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
